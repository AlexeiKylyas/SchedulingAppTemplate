name: '[SchedulingAppTemplate] Extract Review Rules'

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  CORPUS_PATH: '.github/claude-review-corpus.jsonl'
  EXTRACTION_MODEL: 'claude-sonnet-4-6'
  SEMANTIC_DEDUP_MODEL: 'claude-sonnet-4-6'
  REPO_NAME: 'SchedulingAppTemplate'

jobs:
  extract-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Two independent guards — both are required:
    #
    # 1. `merged == true`: only run on actual merges, not on PR closes without merge.
    #    Without this the job would fire on every closed PR (e.g. "Close without merging").
    #
    # 2. `actor != 'github-actions[bot]'`: prevents this workflow from re-firing when the
    #    bot itself pushes the corpus-update commit (which may trigger a pull_request:closed
    #    event on short-lived branches). Note: the commit step (sub-epic 3.4) also adds
    #    [skip ci] to the commit message, which guards push-triggered workflows — but that
    #    guard does not cover pull_request events, so this actor check fills that gap.
    #    Both guards protect different scenarios; do not remove either thinking it is redundant.
    if: github.event.pull_request.merged == true && github.actor != 'github-actions[bot]'
    permissions:
      contents: write       # required to push corpus branch and commit
      pull-requests: write  # required to fetch PR comments/reviews and to open corpus-update PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install runner deps
        working-directory: .github/scripts
        run: npm ci
      - name: Extract candidate rules
        id: extract
        working-directory: .github/scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CORPUS_PATH: ${{ env.CORPUS_PATH }}
          EXTRACTOR_MODEL: ${{ env.EXTRACTION_MODEL }}
          SEMANTIC_DEDUP_MODEL: ${{ env.SEMANTIC_DEDUP_MODEL }}
        run: |
          node extract-review-rules.mjs --pr ${{ github.event.pull_request.number }} \
            | node sanitize-and-dedup.mjs --corpus ../claude-review-corpus.jsonl \
            > /tmp/new-rules.jsonl
          if [ -s /tmp/new-rules.jsonl ]; then
            echo "has_new_rules=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Append + commit + open PR
        if: steps.extract.outputs.has_new_rules == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BRANCH="corpus/from-pr-${SOURCE_PR_NUMBER}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cat /tmp/new-rules.jsonl >> ${{ env.CORPUS_PATH }}
          git add ${{ env.CORPUS_PATH }}
          # [skip ci] kept for defence-in-depth (no push-triggered workflow currently,
          # but it costs nothing and guards against future workflow additions).
          git commit -m "chore(corpus): rules from PR #${SOURCE_PR_NUMBER} [skip ci]"
          # Push branch; retry rebase-on-conflict in case another corpus PR landed on main.
          for i in 1 2; do
            git pull --rebase origin main \
              && git push --set-upstream origin "$BRANCH" \
              && break
            sleep $((i * 2))
          done

          RULE_COUNT=$(wc -l < /tmp/new-rules.jsonl | tr -d ' ')

          # Ensure label exists (idempotent — safe to run even if label already present).
          gh label create corpus-update --color 0075ca \
            --description "Auto-extracted corpus rule update" --force 2>/dev/null || true

          gh pr create \
            --title "chore(corpus): ${RULE_COUNT} rule(s) from PR #${SOURCE_PR_NUMBER}" \
            --body "$(cat <<EOF
          Auto-generated corpus update extracted from merged PR #${SOURCE_PR_NUMBER} ("${SOURCE_PR_TITLE}").

          **Survivors after gate:** ${RULE_COUNT}
          (Layer 1a secrets / 1b prompt-injection / 2 substring-title / 3 semantic-LLM rejections logged in the action run.)

          **What to do:**
          Review the diff against \`.github/claude-review-corpus.jsonl\`. If the new rule(s) look reasonable and non-duplicate, click **Merge pull request**. If hallucinated or low-quality, **Close** the PR (corpus stays untouched).

          Action run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Source PR: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${SOURCE_PR_NUMBER}

          🤖 Generated by extract-review-rules.yml
          EOF
          )" \
            --label "corpus-update" \
            --head "$BRANCH" \
            --base main
